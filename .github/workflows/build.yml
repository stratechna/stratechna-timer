name: Build Stratechna Timer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:  # Permite correr manualmente

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin --target x86_64-apple-darwin'
            name: macOS
          - platform: windows-latest
            args: ''
            name: Windows

    runs-on: ${{ matrix.platform }}
    name: Build ${{ matrix.name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked
        shell: bash

      # macOS — build universal (Apple Silicon + Intel)
      - name: Build macOS Universal
        if: matrix.platform == 'macos-latest'
        run: |
          cd src-tauri
          cargo tauri build --target universal-apple-darwin
        env:
          TAURI_SIGNING_PRIVATE_KEY: ''
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ''

      # Windows
      - name: Build Windows
        if: matrix.platform == 'windows-latest'
        run: |
          cd src-tauri
          cargo tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ''
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ''

      # Upload artefactos macOS
      - name: Upload macOS DMG
        if: matrix.platform == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: stratechna-timer-macos
          path: src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: warn

      # Upload artefactos Windows
      - name: Upload Windows MSI
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: stratechna-timer-windows-msi
          path: src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: warn

      - name: Upload Windows EXE
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: stratechna-timer-windows-exe
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn

  # Cria release automático quando é uma tag
  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download artefactos
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Criar Release GitHub
        uses: softprops/action-gh-release@v2
        with:
          name: Stratechna Timer ${{ github.ref_name }}
          body: |
            ## Stratechna Timer ${{ github.ref_name }}

            ### Instalação

            **macOS** (Apple Silicon + Intel)
            1. Descarrega o ficheiro `.dmg`
            2. Abre e arrasta para a pasta Aplicações
            3. Na primeira abertura: clique direito → Abrir → Abrir mesmo assim

            **Windows**
            1. Descarrega o ficheiro `.msi` ou `.exe`
            2. Na primeira execução: "Mais informações" → "Executar mesmo assim"
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.msi
            artifacts/**/*.exe
          draft: false
